name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ vars.REGISTRY || 'docker.io' }}
  IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE || secrets.REGISTRY_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint backend
        working-directory: backend
        run: |
          npm install
          npm run lint

      - name: Lint frontend
        working-directory: frontend
        run: |
          npm install
          npm run lint

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate worker syntax
        working-directory: worker
        run: |
          python -m pip install -r requirements.txt
          python -m py_compile worker.py

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ai-task-backend:${{ env.IMAGE_TAG }}

      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: worker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ai-task-worker:${{ env.IMAGE_TAG }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          build-args: |
            VITE_API_URL=${{ vars.PUBLIC_API_URL || '' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/ai-task-frontend:${{ env.IMAGE_TAG }}

  update-infra:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && vars.INFRA_REPO != ''
    steps:
      - name: Checkout infra repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update image tags
        working-directory: infra
        run: |
          sed -i "s#image: .*/ai-task-backend:.*#image: $REGISTRY/$IMAGE_NAMESPACE/ai-task-backend:$IMAGE_TAG#g" manifests/base/backend.yaml
          sed -i "s#image: .*/ai-task-worker:.*#image: $REGISTRY/$IMAGE_NAMESPACE/ai-task-worker:$IMAGE_TAG#g" manifests/base/worker.yaml
          sed -i "s#image: .*/ai-task-frontend:.*#image: $REGISTRY/$IMAGE_NAMESPACE/ai-task-frontend:$IMAGE_TAG#g" manifests/base/frontend.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manifests/base
          git commit -m "Update images to $IMAGE_TAG" || exit 0
          git push
